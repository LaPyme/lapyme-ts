      type: "object"
      properties:
        object:
          type: "string"
          const: "supplier"
        id:
          type: "string"
          format: "uuid"
        name:
          type: "string"
        company_name:
          anyOf:
            - type: "string"
            - type: "null"
        description:
          anyOf:
            - type: "string"
            - type: "null"
        email:
          anyOf:
            - type: "string"
            - type: "null"
        phone:
          anyOf:
            - type: "string"
            - type: "null"
        tax_id:
          anyOf:
