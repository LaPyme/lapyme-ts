openapi: "3.1.0"
info:
  title: "La Pyme API"
  description: "API externa para integrar con el sistema de gestión La Pyme. v1 cubre clientes, productos, ventas, stock y transferencias. v2 agrega compras, proveedores y reportes con errores estructurados e idempotencia."
  version: "1.0.0"
  contact:
    name: "Soporte La Pyme"
    email: "hola@lapyme.com.ar"
  license:
    name: "Propietario"
    url: "https://lapyme.com.ar/terminos"
servers:
  - url: "https://api.lapyme.com.ar"
    description: "Servidor de producción"
security:
  - bearerAuth: []
components:
