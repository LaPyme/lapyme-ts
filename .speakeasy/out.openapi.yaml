  /api/v1/transfers:
    post:
      summary: "Crear nueva transferencia"
      description: "Crea una nueva transferencia de productos entre depósitos de la organización. Requiere depósitos de origen y destino diferentes, fecha de transferencia y al menos un producto con cantidad."
      operationId: "createTransfer"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransferRequest"
      responses:
        "201":
          description: "Transferencia creada exitosamente"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTransferResponse"
        "400":
          description: "Error de validación o lógica de negocio"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  success:
                    type: "boolean"
                    example: false
                  error:
                    type: "string"
                    example: "Las ubicaciones de origen y destino deben ser diferentes"
                  code:
                    type: "string"
                    example: "SAME_WAREHOUSE_ERROR"
                required:
                  - "success"
                  - "error"
        "404":
          description: "Ubicación o producto no encontrado"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  success:
                    type: "boolean"
                    example: false
                  error:
                    type: "string"
                    example: "Recurso no encontrado o inactivo"
                  code:
                    type: "string"
                    example: "RESOURCE_NOT_FOUND"
                required:
                  - "success"
                  - "error"
        "429":
          $ref: "#/components/responses/RateLimitedError"
      x-speakeasy-group: transfers
      x-speakeasy-name-override: create
  /api/v1/customers:
