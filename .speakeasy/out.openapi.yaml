    ReportQueryResponse:
      type: "object"
      properties:
        requestId:
          type: "string"
        success:
          type: "boolean"
          enum:
            - true
        data:
          type: "object"
          properties:
            rows:
              type: "array"
              items:
                type: "object"
                properties:
                  id:
                    type: "string"
                  ids:
                    type: "array"
                    items:
                      type: "string"
                  labels:
                    type: "array"
                    items:
                      type: "string"
                  measures:
                    type: "object"
                    additionalProperties:
                      type: "number"
                required:
                  - "id"
                  - "ids"
                  - "labels"
                  - "measures"
                additionalProperties: false
            totals:
              nullable: true
              description: "Totales agregados de todas las filas. Presente solo cuando se envía `includeTotals: true`."
              type: "object"
              additionalProperties:
                type: "number"
            metadata:
              type: "object"
              properties:
                source:
                  type: "string"
                  enum:
                    - "sales"
                    - "purchases"
                    - "inventory"
                dimensions:
                  type: "array"
                  items:
                    type: "string"
                measures:
                  type: "array"
                  items:
                    type: "string"
                period:
                  type: "object"
                  properties:
                    startDate:
                      type: "string"
                    endDate:
                      type: "string"
                  required:
                    - "startDate"
                    - "endDate"
                  additionalProperties: false
                dateBasis:
                  type: "string"
                  enum:
                    - "commercial"
                    - "fiscal"
              required:
                - "source"
                - "dimensions"
                - "measures"
              additionalProperties: false
          required:
            - "rows"
            - "totals"
            - "metadata"
          additionalProperties: false
      required:
        - "requestId"
        - "success"
        - "data"
      additionalProperties: false
