          type: "string"
          format: "date-time"
          pattern: "^(?:(?:\\d\\d[2468][048]|\\d\\d[13579][26]|\\d\\d0[48]|[02468][048]00|[13579][26]00)-02-29|\\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\\d|30)|(?:02)-(?:0[1-9]|1\\d|2[0-8])))T(?:(?:[01]\\d|2[0-3]):[0-5]\\d(?::[0-5]\\d(?:\\.\\d+)?)?(?:Z))$"
        version:
          type: "string"
        uptime:
          type: "number"
        environment:
          type: "string"
      required:
        - "status"
        - "timestamp"
        - "version"
      additionalProperties: false
    Pagination:
      type: "object"
      properties:
        page:
          type: "number"
          minimum: 1
        limit:
          type: "number"
          minimum: 1
        total:
          type: "number"
          minimum: 0
        totalPages:
          type: "number"
          minimum: 1
