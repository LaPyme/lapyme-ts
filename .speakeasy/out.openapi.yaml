openapi: "3.1.0"
info:
  title: "La Pyme API"
  description: "Resources and workflows for purchases, sales, inventory, contacts, products, reports, and settings."
  version: "1.0.0"
  contact:
    name: "La Pyme Support"
    email: "hola@lapyme.com.ar"
  license:
    name: "Proprietary"
    url: "https://lapyme.com.ar/terminos"
servers:
  - url: "https://api.lapyme.com.ar"
    description: "Servidor de producción"
security:
  - bearerAuth: []
tags:
  - name: "API"
    description: "Public API operations for La Pyme integrations."
x-speakeasy-retries:
  strategy: "backoff"
  backoff:
    initialInterval: 500
    maxInterval: 60000
    maxElapsedTime: 3600000
    exponent: 1.5
  statusCodes:
    - "5XX"
  retryConnectionErrors: true
components:
  schemas:
    ApiErrorDetail:
      type: "object"
      properties:
        field:
          type: "string"
        code:
          type: "string"
        message:
          type: "string"
      required:
        - "code"
        - "message"
      additionalProperties: false
    ApiErrorEnvelope:
      type: "object"
      properties:
        request_id:
          type: "string"
        error:
          type: "object"
          properties:
            type:
              type: "string"
              enum:
                - "api_error"
                - "authentication_error"
                - "authorization_error"
                - "business_error"
                - "external_dependency_error"
                - "idempotency_error"
                - "invalid_request_error"
                - "rate_limit_error"
            code:
              type: "string"
            message:
              type: "string"
            retryable:
              type: "boolean"
            details:
              type: "array"
              items:
                $ref: "#/components/schemas/ApiSharedObjectc671832641"
          required:
            - "type"
            - "code"
            - "message"
            - "retryable"
            - "details"
          additionalProperties: false
      required:
        - "request_id"
        - "error"
      additionalProperties: false
    ApiListMetadata:
      type: "object"
      properties:
        has_more:
          type: "boolean"
        next_cursor:
          anyOf:
            - type: "string"
            - type: "null"
      required:
        - "has_more"
        - "next_cursor"
      additionalProperties: false
