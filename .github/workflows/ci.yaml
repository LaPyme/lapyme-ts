name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  sdk:
    name: SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Pack and smoke test
        run: |
          set -euo pipefail

          tarball="$(npm pack --silent)"
          tmp_dir="$(mktemp -d)"
          cp "$tarball" "$tmp_dir/"

          pushd "$tmp_dir"
          npm init -y >/dev/null
          npm install "./$tarball" typescript@~5.8.3 >/dev/null

          node --input-type=module -e 'import { Lapyme } from "lapyme"; if (typeof Lapyme !== "function") throw new Error("Lapyme export missing");'

          cat > smoke.ts <<'EOF'
          import { Lapyme } from "lapyme";
          import type { ApiSupplierListResponse } from "lapyme/models";

          const client = new Lapyme({ bearerAuth: "token" });
          const response: ApiSupplierListResponse | undefined = undefined;

          console.log(Boolean(client.suppliers), response);
          EOF

          npx tsc --module NodeNext --moduleResolution NodeNext --target ES2022 --strict --noEmit smoke.ts
          test -f node_modules/lapyme/docs/sdks/suppliers/README.md
